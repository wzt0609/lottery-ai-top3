name: Lottery Cloud Update

on:
  workflow_dispatch:
  schedule:
    # Runs every 30 minutes. The Python script decides whether to publish
    # prediction-only or post-draw review + prediction based on Beijing time.
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: lottery-cloud-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run cloud update
        run: python lottery_predictor.py cloud

      - name: Commit generated site and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports docs config.json
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update lottery prediction site"
            git push
          fi
